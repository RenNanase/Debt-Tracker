    function renderDashboard() {
      const dashboard = document.getElementById("dashboard");
      const totalRemaining = calculateTotalRemaining();
      const activeCount = getActiveDebtsCount();
      const nextPayment = getNextPaymentDate();
      const nextPaymentAmount = getNextPaymentAmount();
      const debtFreeDate = getDebtFreeDate();
      const beforePaydayCount = countUnpaidBeforePayday();
      const overdueCount = countOverdue();
      const currentMonthDue = calculateCurrentMonthDue();
      const nextBeforePayday = isCurrentMonthBeforePayday(nextPayment);
      const nextOverdue = isOverdue(nextPayment);

      dashboard.innerHTML =
        '<div class="dashboard__card dashboard__card--wide">' +
          '<div class="dashboard__label">Total Remaining</div>' +
          '<div class="dashboard__value dashboard__value--danger">' + formatCurrency(totalRemaining) + '</div>' +
        '</div>' +
        '<div class="dashboard__card dashboard__card--wide">' +
          '<div class="dashboard__label">Due This Month</div>' +
          '<div class="dashboard__value dashboard__value--primary">' + formatCurrency(currentMonthDue) + '</div>' +
        '</div>' +
        '<div class="dashboard__card">' +
          '<div class="dashboard__label">Active Debts</div>' +
          '<div class="dashboard__value">' + activeCount + '</div>' +
        '</div>' +
        '<div class="dashboard__card">' +
          '<div class="dashboard__label">Debt-Free Date</div>' +
          '<div class="dashboard__value dashboard__value--success">' +
            (debtFreeDate ? formatInstallmentDateShort(debtFreeDate) : "—") +
          '</div>' +
        '</div>' +
        '<div class="dashboard__card">' +
          '<div class="dashboard__label">Next Payment</div>' +
          '<div class="dashboard__value ' + (nextOverdue ? 'dashboard__value--danger' : (nextBeforePayday ? 'dashboard__value--warning' : 'dashboard__value--primary')) + '">' +
            (nextPayment ? formatCurrency(nextPaymentAmount) : "—") +
          '</div>' +
          (nextPayment ?
            '<div class="dashboard__subvalue">' + formatInstallmentDateShort(nextPayment) + '</div>' :
            '') +
          (beforePaydayCount > 0 ?
            '<div style="margin-top:6px">' + renderWarningTag() + ' <span style="font-size:0.75rem;color:var(--text-secondary)">(' + beforePaydayCount + ' this month before payday)</span></div>' :
            '') +
        '</div>' +
        '<div class="dashboard__card">' +
          '<div class="dashboard__label">Overdue</div>' +
          '<div class="dashboard__value ' + (overdueCount > 0 ? 'dashboard__value--danger' : '') + '">' + overdueCount + '</div>' +
        '</div>';
    }

    function renderDebtList() {
      const listEl = document.getElementById("debt-list");
      const activeDebts = getActiveDebts();

      if (activeDebts.length === 0) {
        listEl.innerHTML = "";
        return;
      }

      if (groupingMode === "type") {
        listEl.innerHTML = renderAlertBanners() + renderTypeGroups();
      } else {
        listEl.innerHTML = renderAlertBanners() + renderDueDateGroups();
      }
    }

    function renderAlertBanners() {
      let html = "";
      const overdueCount = countOverdue();
      const beforePaydayCount = countUnpaidBeforePayday();

      if (overdueCount > 0) {
        html +=
          '<div class="overdue-banner">' +
            '<span>●</span>' +
            '<span><span class="overdue-banner__count">' + overdueCount + '</span> overdue payment' +
            (overdueCount === 1 ? '' : 's') + ' — please settle these as soon as possible.</span>' +
          '</div>';
      }

      if (beforePaydayCount > 0) {
        html += renderPaydayBanner();
      }

      return html;
    }

    function renderPaydayBanner() {
      const count = countUnpaidBeforePayday();
      if (count === 0) return "";
      return (
        '<div class="payday-banner">' +
          '<span>⚠</span>' +
          '<span><span class="payday-banner__count">' + count + '</span> payment' + (count === 1 ? '' : 's') +
          ' due before your payday (' + getOrdinal(payday) + ') this month — pay attention to these debts.</span>' +
        '</div>'
      );
    }

    function renderTypeGroups() {
      const activeDebts = getActiveDebts();
      const groups = groupByType(activeDebts);
      if (activeDebts.length === 0) return "";
      if (groups.length === 0) return "";

      return groups.map(function(group) {
        const cards = group.debts.map(function(debt) {
          const remaining = calculateRemainingBalance(debt);
          const nextDue = getNextPaymentForDebt(debt);
          const nextDueAmount = getNextPaymentAmountForDebt(debt);
          const showWarning = debtHasBeforePaydayWarning(debt);
          const showOverdue = debtHasOverdue(debt);
          let tags = "";
          if (showOverdue) tags += renderOverdueTag();
          if (showWarning) tags += renderWarningTag();
          return (
            '<button type="button" class="debt-card" data-debt-id="' + debt.id + '">' +
              '<div class="debt-card__header">' +
                '<div>' +
                  '<div class="debt-card__name">' + escapeHtml(debt.name) + '</div>' +
                  '<div class="debt-card__type">' + getDebtTypeLabel(debt.type) + '</div>' +
                '</div>' +
                '<div class="debt-card__balance">' + formatCurrency(remaining) + '</div>' +
              '</div>' +
              '<div class="debt-card__meta">' +
                '<span>' + (remaining > 0 ?
                  'Next: ' + (nextDue ? formatCurrency(nextDueAmount) + ' · ' + formatInstallmentDateShort(nextDue) : '—') :
                  'Paid off ✓') + '</span>' +
                '<span>' + debt.installments.filter(function(i) { return !i.paid; }).length + ' unpaid</span>' +
              '</div>' +
              (tags ? '<div class="debt-card__tags">' + tags + '</div>' : '') +
            '</button>'
          );
        }).join("");

        return '<h3 class="group-header">' + group.label + '</h3>' + cards;
      }).join("");
    }

    function renderDueDateGroups() {
      const activeDebts = getActiveDebts();
      const groups = groupByDueDate(activeDebts);

      if (activeDebts.length === 0) return "";
      if (groups.length === 0) {
        return '<div class="empty-state"><p>No unpaid installments — you\'re all caught up! 🎉</p></div>';
      }

      return groups.map(function(group) {
        const items = group.items.map(function(item) {
          const dueDate = getInstallmentDate(item.installment);
          const tags = renderInstallmentTags(dueDate, false);
          return (
            '<div class="due-item' + (isOverdue(dueDate) ? ' due-item--overdue' : '') + '">' +
              '<input type="checkbox" class="due-item__checkbox" ' +
                'data-debt-id="' + item.debt.id + '" ' +
                'data-installment-index="' + item.installmentIndex + '" ' +
                'aria-label="Mark ' + escapeHtml(item.debt.name) + ' as paid">' +
              '<div class="due-item__info">' +
                '<div class="due-item__name">' + escapeHtml(item.debt.name) + '</div>' +
                '<div class="due-item__type">' + getDebtTypeLabel(item.debt.type) + '</div>' +
                (tags ? '<div class="due-item__tags">' + tags + '</div>' : '') +
              '</div>' +
              '<div class="due-item__amount">' + formatCurrency(item.installment.amount) + '</div>' +
            '</div>'
          );
        }).join("");

        let headerTags = "";
        if (group.overdue) headerTags += renderOverdueTag();
        if (group.beforePayday) headerTags += renderWarningTag();
        return '<h3 class="group-header">' + group.label + (headerTags ? ' ' + headerTags : '') + '</h3>' + items;
      }).join("");
    }

    function updateGroupingToggle() {
      const typeBtn = document.getElementById("group-type-btn");
      const dueDateBtn = document.getElementById("group-duedate-btn");

      typeBtn.classList.toggle("segmented-control__btn--active", groupingMode === "type");
      dueDateBtn.classList.toggle("segmented-control__btn--active", groupingMode === "dueDate");
      typeBtn.setAttribute("aria-selected", groupingMode === "type" ? "true" : "false");
      dueDateBtn.setAttribute("aria-selected", groupingMode === "dueDate" ? "true" : "false");
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    // ========== MODAL HANDLERS ==========
    function openModal(modalId) {
      document.getElementById(modalId).classList.add("modal--open");
    }

    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove("modal--open");
      if (modalId === "debt-modal") {
        editingDebtId = null;
        clearFormError("debt-form-error");
      }
    }

    function populateTypeSelect() {
      const select = document.getElementById("debt-type");
      select.innerHTML = DEBT_TYPES.map(function(t) {
        return '<option value="' + t.value + '">' + t.label + '</option>';
      }).join("");
    }

    function renderFormInstallments() {
      if (installmentMode === "fixed") {
        renderFixedInstallmentsPreview();
        return;
      }

      const container = document.getElementById("form-installments");
      container.innerHTML = formInstallments.map(function(inst, index) {
        const dueDate = inst.date || inst.month || "";
        const dateReadonly = index > 0;
        return (
          '<div class="installment-item' + (inst.paid ? ' installment-item--paid' : '') + '">' +
            '<input type="date" value="' + dueDate + '" data-index="' + index + '" data-field="date"' +
              (dateReadonly ? ' readonly tabindex="-1"' : '') +
              ' aria-label="Installment due date ' + (index + 1) + '">' +
            '<input type="number" value="' + (inst.amount || '') + '" min="0.01" step="0.01" placeholder="Amount" data-index="' + index + '" data-field="amount" aria-label="Installment amount ' + (index + 1) + '">' +
            (inst.paid ? '<span style="color:var(--success);font-size:0.75rem;font-weight:600">Paid</span>' : '') +
            renderInstallmentTags(dueDate, inst.paid) +
            '<button type="button" class="installment-item__remove" data-remove-index="' + index + '" aria-label="Remove installment ' + (index + 1) + '">&times;</button>' +
          '</div>'
        );
      }).join("");
      updateCustomInstallmentSummary();
    }

    function openAddDebtModal() {
      editingDebtId = null;
      formInstallments = [{ date: "", amount: 0, paid: false }];
      installmentMode = "custom";
      clearFormError("debt-form-error");

      document.getElementById("debt-modal-title").textContent = "Add Debt";
      document.getElementById("debt-name").value = "";
      document.getElementById("debt-type").value = "loan";
      document.getElementById("debt-total").value = "";
      document.getElementById("debt-total").readOnly = false;
      document.getElementById("fixed-months").value = "";
      document.getElementById("fixed-monthly").value = "";
      document.getElementById("fixed-start").value = getDefaultFirstPaymentDate();
      document.getElementById("delete-debt-btn").style.display = "none";
      document.getElementById("installment-mode-control").style.display = "flex";

      setInstallmentMode("custom");
      renderFormInstallments();
      bindFormInstallmentListeners();
      openModal("debt-modal");
    }

    function openEditDebtModal(debtId) {
      const debt = debts.find(function(d) { return d.id === debtId; });
      if (!debt || isDebtSettled(debt)) return;

      editingDebtId = debtId;
      installmentMode = "custom";
      clearFormError("debt-form-error");
      formInstallments = debt.installments.map(function(inst) {
        return { date: getInstallmentDate(inst), amount: inst.amount, paid: inst.paid };
      });

      document.getElementById("debt-modal-title").textContent = "Edit Debt";
      document.getElementById("debt-name").value = debt.name;
      document.getElementById("debt-type").value = debt.type;
      const syncedTotal = syncDebtTotalForEdit(formInstallments, debt.totalAmount || 0);
      document.getElementById("debt-total").value = syncedTotal > 0 ? syncedTotal : "";
      document.getElementById("debt-total").readOnly = false;
      document.getElementById("delete-debt-btn").style.display = "block";
      document.getElementById("installment-mode-control").style.display = "none";
      document.getElementById("fixed-installment-fields").style.display = "none";
      document.getElementById("fixed-installment-preview-group").style.display = "none";
      document.getElementById("custom-installment-fields").style.display = "block";

      renderFormInstallments();
      bindFormInstallmentListeners();
      closeModal("detail-modal");
      openModal("debt-modal");
    }

    function openDetailModal(debtId) {
      const debt = debts.find(function(d) { return d.id === debtId; });
      if (!debt) return;

      detailDebtId = debtId;
      const remaining = calculateRemainingBalance(debt);
      const lastPayment = calculateLastPaymentDate(debt);
      const nextDue = getNextPaymentForDebt(debt);
      const nextDueAmount = getNextPaymentAmountForDebt(debt);

      document.getElementById("detail-modal-title").textContent = debt.name;

      const sortedInstallments = debt.installments
        .map(function(inst, index) { return { inst: inst, index: index }; })
        .sort(function(a, b) {
          return getInstallmentDate(a.inst).localeCompare(getInstallmentDate(b.inst));
        });

      const installmentsHtml = sortedInstallments.map(function(item) {
        const inst = item.inst;
        const dueDate = getInstallmentDate(inst);
        const tags = renderInstallmentTags(dueDate, inst.paid);
        const settled = isDebtSettled(debt);

        if (settled) {
          return (
            '<div class="detail-installment detail-installment--paid">' +
              '<div class="detail-installment__date-row">' +
                '<div class="detail-installment__month">' + formatInstallmentDate(dueDate) + '</div>' +
              '</div>' +
              '<div class="detail-installment__amount">' + formatCurrency(inst.amount) + '</div>' +
              '<span class="detail-installment__paid-label">Paid</span>' +
            '</div>'
          );
        }

        return (
          '<div class="detail-installment' + (inst.paid ? ' detail-installment--paid' : '') + (isOverdue(dueDate) && !inst.paid ? ' detail-installment--overdue' : '') + '">' +
            '<input type="checkbox" ' + (inst.paid ? 'checked' : '') +
              ' data-debt-id="' + debt.id + '" data-installment-index="' + item.index + '" ' +
              'aria-label="Mark ' + formatInstallmentDate(dueDate) + ' as paid">' +
            '<div class="detail-installment__date-row">' +
              '<div class="detail-installment__month">' + formatInstallmentDate(dueDate) + '</div>' +
              tags +
            '</div>' +
            '<div class="detail-installment__amount">' + formatCurrency(inst.amount) + '</div>' +
            (inst.paid ? '<span class="detail-installment__paid-label">Paid</span>' : '') +
          '</div>'
        );
      }).join("");

      let alertHtml = "";
      if (isDebtSettled(debt)) {
        alertHtml += '<div class="detail-settled-badge">Settled ✓ — ' + formatDateDisplay(debt.settledAt) + '</div>';
      } else {
        if (debtHasOverdue(debt)) {
          alertHtml += '<div style="margin-bottom:12px">' + renderOverdueTag() + ' <span style="font-size:0.8125rem;color:var(--text-secondary)">Has overdue payment(s)</span></div>';
        }
        if (debtHasBeforePaydayWarning(debt)) {
          alertHtml += '<div style="margin-bottom:12px">' + renderWarningTag() + ' <span style="font-size:0.8125rem;color:var(--text-secondary)">Has payment(s) due before payday (' + getOrdinal(payday) + ')</span></div>';
        }
      }

      const totalPaid = calculateTotalPaid(debt);
      const statsHtml = isDebtSettled(debt) ?
        '<div style="display:flex;justify-content:space-between;margin-bottom:16px;gap:8px">' +
          '<div><span style="font-size:0.75rem;color:var(--text-secondary)">TOTAL PAID</span><br>' +
          '<strong style="color:var(--history-pink);font-size:1.25rem">' + formatCurrency(totalPaid) + '</strong></div>' +
          '<div style="text-align:center"><span style="font-size:0.75rem;color:var(--text-secondary)">INSTALLMENTS</span><br>' +
          '<strong>' + debt.installments.length + '</strong></div>' +
          '<div style="text-align:right"><span style="font-size:0.75rem;color:var(--text-secondary)">SETTLED</span><br>' +
          '<strong style="color:var(--history-pink)">' + formatDateDisplay(debt.settledAt) + '</strong></div>' +
        '</div>' :
        '<div style="display:flex;justify-content:space-between;margin-bottom:16px;gap:8px">' +
          '<div><span style="font-size:0.75rem;color:var(--text-secondary)">REMAINING</span><br>' +
          '<strong style="color:var(--danger);font-size:1.25rem">' + formatCurrency(remaining) + '</strong></div>' +
          '<div style="text-align:center"><span style="font-size:0.75rem;color:var(--text-secondary)">NEXT PAYMENT</span><br>' +
          '<strong>' + (nextDue ? formatCurrency(nextDueAmount) + '<br><span style="font-size:0.8125rem;color:var(--text-secondary)">' + formatInstallmentDateShort(nextDue) + '</span>' : '—') + '</strong></div>' +
          '<div style="text-align:right"><span style="font-size:0.75rem;color:var(--text-secondary)">DEBT-FREE</span><br>' +
          '<strong style="color:var(--success)">' + (lastPayment ? formatInstallmentDateShort(lastPayment) : 'Paid off') + '</strong></div>' +
        '</div>';

      document.getElementById("detail-content").innerHTML =
        '<p style="margin-bottom:12px;color:var(--text-secondary)">' + getDebtTypeLabel(debt.type) + '</p>' +
        alertHtml +
        statsHtml +
        '<h3 style="font-size:0.8125rem;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.04em">Installments</h3>' +
        installmentsHtml;

      const detailActions = document.querySelector("#detail-modal .detail-actions");
      const editBtn = document.getElementById("edit-from-detail-btn");
      const deleteBtn = document.getElementById("delete-from-detail-btn");
      const doneBtn = detailActions.querySelector("[data-close-modal='detail-modal']");

      if (isDebtSettled(debt)) {
        detailActions.style.display = "none";
      } else {
        detailActions.style.display = "";
        editBtn.style.display = "";
        deleteBtn.style.display = "";
        if (doneBtn) doneBtn.style.display = "";
      }

      openModal("detail-modal");
    }

    function openDeleteModal(type, id, name) {
      if (type === "debt") {
        const debt = debts.find(function(d) { return d.id === id; });
        if (debt && isDebtSettled(debt)) return;
      }

      deleteTarget = { type: type, id: id };
      document.getElementById("delete-modal-title").textContent =
        type === "debt" ? "Delete Debt?" : "Delete Note?";
      document.getElementById("delete-item-name").textContent = name;
      closeModal("debt-modal");
      closeModal("detail-modal");
      closeModal("note-modal");
      openModal("delete-modal");
    }

    function openAddNoteModal() {
      editingNoteId = null;
      clearFormError("note-form-error");
      document.getElementById("note-modal-title").textContent = "Add Note";
      document.getElementById("note-title").value = "";
      document.getElementById("note-content").value = "";
      document.getElementById("delete-note-btn").style.display = "none";
      openModal("note-modal");
    }

    function openEditNoteModal(noteId) {
      const note = notes.find(function(n) { return n.id === noteId; });
      if (!note) return;

      editingNoteId = noteId;
      clearFormError("note-form-error");
      document.getElementById("note-modal-title").textContent = "Edit Note";
      document.getElementById("note-title").value = note.title;
      document.getElementById("note-content").value = note.content;
      document.getElementById("delete-note-btn").style.display = "block";
      openModal("note-modal");
    }

    function handleSaveNote(e) {
      e.preventDefault();

      const noteData = {
        title: document.getElementById("note-title").value.trim(),
        content: document.getElementById("note-content").value.trim()
      };

      if (!validateNote(noteData, "note-form-error")) return;

      if (editingNoteId) {
        const note = notes.find(function(n) { return n.id === editingNoteId; });
        if (note) {
          note.title = noteData.title;
          note.content = noteData.content;
          note.updatedAt = new Date().toISOString();
        }
      } else {
        const newNote = createDefaultNote();
        newNote.title = noteData.title;
        newNote.content = noteData.content;
        notes.push(newNote);
      }

      saveNotes();
      closeModal("note-modal");
      render();
    }

    function handleSaveDebt(e) {
      e.preventDefault();
      clearFormError("debt-form-error");

      if (installmentMode === "fixed" && !editingDebtId) {
        updateFixedPlan();
        const monthly = parseFloat(document.getElementById("fixed-monthly").value) || 0;
        const months = parseInt(document.getElementById("fixed-months").value, 10);
        const start = document.getElementById("fixed-start").value;

        if (!monthly || monthly <= 0) {
          showFormError("debt-form-error", "Please enter a valid monthly amount.");
          return;
        }
        if (!start) {
          showFormError("debt-form-error", "Please select the first payment date.");
          return;
        }
        if (!months || months <= 0) {
          showFormError("debt-form-error", "Please enter a valid number of months.");
          return;
        }
      }

      const debtData = {
        name: document.getElementById("debt-name").value.trim(),
        type: document.getElementById("debt-type").value,
        totalAmount: parseFloat(document.getElementById("debt-total").value) || 0,
        installments: getDebtFormInstallments()
      };

      if (!validateDebt(debtData, "debt-form-error", {
        requireTotalMatch: installmentMode === "custom" || !!editingDebtId
      })) return;

      if (editingDebtId) {
        const debt = debts.find(function(d) { return d.id === editingDebtId; });
        if (debt) {
          debt.name = debtData.name;
          debt.type = debtData.type;
          debt.totalAmount = debtData.totalAmount;
          debt.installments = debtData.installments;
          debt.updatedAt = new Date().toISOString();
          updateDebtSettlementStatus(debt);
        }
      } else {
        const newDebt = createDefaultDebt();
        newDebt.name = debtData.name;
        newDebt.type = debtData.type;
        newDebt.totalAmount = debtData.totalAmount;
        newDebt.installments = debtData.installments;
        updateDebtSettlementStatus(newDebt);
        debts.push(newDebt);
      }

      saveDebts();
      closeModal("debt-modal");
      render();
    }

    // ========== EVENT LISTENERS ==========
    function setupStaticListeners() {
      document.getElementById("debt-list").addEventListener("click", function(e) {
        const card = e.target.closest(".debt-card[data-debt-id]");
        if (card) {
          openDetailModal(card.getAttribute("data-debt-id"));
        }
      });

      document.getElementById("debt-list").addEventListener("change", function(e) {
        if (e.target.classList.contains("due-item__checkbox")) {
          markInstallmentPaid(
            e.target.getAttribute("data-debt-id"),
            parseInt(e.target.getAttribute("data-installment-index"), 10)
          );
        }
      });

      document.getElementById("detail-content").addEventListener("change", function(e) {
        if (e.target.matches("input[type='checkbox'][data-debt-id]")) {
          markInstallmentPaid(
            e.target.getAttribute("data-debt-id"),
            parseInt(e.target.getAttribute("data-installment-index"), 10)
          );
        }
      });

      document.getElementById("history-list").addEventListener("click", function(e) {
        const card = e.target.closest(".history-card[data-debt-id]");
        if (card) {
          openDetailModal(card.getAttribute("data-debt-id"));
        }
      });

      document.getElementById("notes-list").addEventListener("click", function(e) {
        const card = e.target.closest(".note-card[data-note-id]");
        if (card) {
          openEditNoteModal(card.getAttribute("data-note-id"));
        }
      });

      document.getElementById("fab-btn").addEventListener("click", function() {
        if (currentView === "debts") {
          openAddDebtModal();
        } else {
          openAddNoteModal();
        }
      });

      document.getElementById("nav-debts-btn").addEventListener("click", function() {
        currentView = "debts";
        saveAppData();
        render();
      });

      document.getElementById("nav-history-btn").addEventListener("click", function() {
        currentView = "history";
        saveAppData();
        render();
      });

      document.getElementById("nav-notes-btn").addEventListener("click", function() {
        currentView = "notes";
        saveAppData();
        render();
      });

      document.getElementById("nav-settings-btn").addEventListener("click", function() {
        currentView = "settings";
        saveAppData();
        render();
      });

      document.getElementById("group-type-btn").addEventListener("click", function() {
        groupingMode = "type";
        saveDebts();
        render();
      });

      document.getElementById("group-duedate-btn").addEventListener("click", function() {
        groupingMode = "dueDate";
        saveDebts();
        render();
      });

      document.getElementById("debt-form").addEventListener("submit", handleSaveDebt);
      document.getElementById("note-form").addEventListener("submit", handleSaveNote);

      document.getElementById("mode-custom-btn").addEventListener("click", function() {
        setInstallmentMode("custom");
        if (formInstallments.length === 0) {
          formInstallments = [{ date: "", amount: 0, paid: false }];
        }
        renderFormInstallments();
        bindFormInstallmentListeners();
      });

      document.getElementById("mode-fixed-btn").addEventListener("click", function() {
        setInstallmentMode("fixed");
      });

      document.getElementById("fixed-months").addEventListener("input", updateFixedPlan);
      document.getElementById("fixed-monthly").addEventListener("input", updateFixedPlan);
      document.getElementById("fixed-start").addEventListener("change", updateFixedPlan);
      document.getElementById("debt-total").addEventListener("input", updateCustomInstallmentSummary);

      document.getElementById("add-installment-btn").addEventListener("click", function() {
        formInstallments.push({ date: getNextCustomDate(formInstallments), amount: 0, paid: false });
        renderFormInstallments();
        bindFormInstallmentListeners();
      });

      document.getElementById("delete-debt-btn").addEventListener("click", function() {
        if (editingDebtId) {
          const debt = debts.find(function(d) { return d.id === editingDebtId; });
          if (debt) openDeleteModal("debt", editingDebtId, debt.name);
        }
      });

      document.getElementById("delete-from-detail-btn").addEventListener("click", function() {
        if (detailDebtId) {
          const debt = debts.find(function(d) { return d.id === detailDebtId; });
          if (debt) openDeleteModal("debt", detailDebtId, debt.name);
        }
      });

      document.getElementById("delete-note-btn").addEventListener("click", function() {
        if (editingNoteId) {
          const note = notes.find(function(n) { return n.id === editingNoteId; });
          if (note) openDeleteModal("note", editingNoteId, note.title);
        }
      });

      document.getElementById("confirm-delete-btn").addEventListener("click", function() {
        if (!deleteTarget) return;

        if (deleteTarget.type === "debt") {
          deleteDebt(deleteTarget.id);
          detailDebtId = null;
          editingDebtId = null;
        } else if (deleteTarget.type === "note") {
          deleteNote(deleteTarget.id);
          editingNoteId = null;
        }

        deleteTarget = null;
        closeModal("delete-modal");
      });

      document.getElementById("edit-from-detail-btn").addEventListener("click", function() {
        if (detailDebtId) openEditDebtModal(detailDebtId);
      });

      document.querySelectorAll("[data-close-modal]").forEach(function(el) {
        el.addEventListener("click", function() {
          closeModal(el.getAttribute("data-close-modal"));
        });
      });

      bindFormInstallmentListeners();
    }

    function bindFormInstallmentListeners() {
      if (installmentMode === "fixed") return;

      document.querySelectorAll("#form-installments input[data-field]").forEach(function(input) {
        function syncInstallmentField() {
          const index = parseInt(input.getAttribute("data-index"), 10);
          const field = input.getAttribute("data-field");
          if (field === "amount") {
            formInstallments[index][field] = parseFloat(input.value) || 0;
            updateCustomInstallmentSummary();
          } else {
            formInstallments[index][field] = input.value;
            if (field === "date" && index === 0) {
              regenerateCustomDatesFromFirst(formInstallments);
            }
          }
          if (field === "date") {
            renderFormInstallments();
            bindFormInstallmentListeners();
          }
        }

        input.addEventListener("change", syncInstallmentField);
        if (input.getAttribute("data-field") === "amount") {
          input.addEventListener("input", updateCustomInstallmentSummary);
        }
      });

      document.querySelectorAll("[data-remove-index]").forEach(function(btn) {
        btn.addEventListener("click", function() {
          const index = parseInt(btn.getAttribute("data-remove-index"), 10);
          formInstallments.splice(index, 1);
          if (index === 0) {
            regenerateCustomDatesFromFirst(formInstallments);
          }
          renderFormInstallments();
          bindFormInstallmentListeners();
        });
      });
    }

    // ========== SERVICE WORKER ==========
    function registerServiceWorker() {
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(function(err) {
          console.warn("Service worker registration failed:", err);
        });
      }
    }

    // ========== INITIALIZATION ==========
    const LOADER_MIN_MS = 900;
    const loaderStartTime = performance.now();

    function setLoaderProgress(percent) {
      const bar = document.getElementById("app-loader-progress");
      const safePercent = Math.max(0, Math.min(100, percent));
      if (bar) bar.style.width = safePercent + "%";
    }

    function hideAppLoader() {
      const elapsed = performance.now() - loaderStartTime;
      const remaining = Math.max(0, LOADER_MIN_MS - elapsed);

      setTimeout(function() {
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            const loader = document.getElementById("app-loader");
            const app = document.getElementById("app");

            if (app) {
              app.classList.add("app--ready");
              app.setAttribute("aria-hidden", "false");
            }

            if (loader) {
              loader.classList.add("app-loader--hidden");
              setTimeout(function() {
                loader.remove();
              }, 300);
            }
          });
        });
      }, remaining);
    }

    function init() {
      setLoaderProgress(12);
      console.log("Debt Tracker v" + APP_VERSION);

      setLoaderProgress(32);
      populateTypeSelect();

      setLoaderProgress(58);
      loadDebts();

      setLoaderProgress(78);
      setupStaticListeners();
      render();

      setLoaderProgress(92);
      registerServiceWorker();

      setLoaderProgress(100);
      hideAppLoader();
    }

    init();
  </script>
</body>
</html>
