<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#007aff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Debt Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>html, body { background: #f5f5f7; margin: 0; } #app-loader { position: fixed; inset: 0; z-index: 9999; background: #f5f5f7; } #app:not(.app--ready) { visibility: hidden; }</style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --primary: #007aff;
      --primary-dark: #0062cc;
      --danger: #ff3b30;
      --success: #34c759;
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --border: #e5e5ea;
      --radius: 16px;
      --radius-sm: 12px;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      padding: 16px;
      padding-bottom: 100px;
    }

    @media (min-width: 768px) {
      .container { max-width: 600px; margin: 0 auto; }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header__title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .header__tagline {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    /* Segmented control */
    .segmented-control {
      display: flex;
      background: var(--border);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
    }

    .segmented-control__btn {
      flex: 1;
      min-height: 44px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .segmented-control__btn:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .segmented-control__btn--active {
      background: var(--card);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
      color: var(--primary);
      font-weight: 600;
    }

    .segmented-control__btn:active {
      transform: scale(0.98);
    }

    /* Dashboard */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .dashboard__card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .dashboard__card--wide {
      grid-column: 1 / -1;
    }

    .dashboard__label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .dashboard__value {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .dashboard__value--danger { color: var(--danger); }
    .dashboard__value--primary { color: var(--primary); font-size: 1.125rem; }

    .dashboard__subvalue {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Group headers */
    .group-header {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 20px 0 10px;
      padding-left: 4px;
    }

    .group-header:first-child { margin-top: 0; }

    /* Debt cards */
    .debt-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      cursor: pointer;
      border: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
      color: inherit;
      transition: transform 0.15s;
    }

    .debt-card:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .debt-card:active { transform: scale(0.98); }

    .debt-card__header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .debt-card__name {
      font-size: 1.0625rem;
      font-weight: 600;
    }

    .debt-card__type {
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .debt-card__balance {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--danger);
    }

    .debt-card__meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Due date items */
    .due-item {
      background: var(--card);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 8px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .due-item__info { flex: 1; min-width: 0; }

    .due-item__name {
      font-weight: 600;
      font-size: 0.9375rem;
    }

    .due-item__type {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .due-item__amount {
      font-weight: 700;
      color: var(--danger);
      font-size: 1rem;
      white-space: nowrap;
    }

    .due-item__checkbox {
      width: 28px;
      height: 28px;
      accent-color: var(--success);
      cursor: pointer;
      flex-shrink: 0;
    }

    .due-item--overdue {
      border-left: 3px solid var(--danger);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-secondary);
    }

    .empty-state__icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state__text { font-size: 1rem; margin-bottom: 8px; }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 28px;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 122, 255, 0.4);
      min-height: 44px;
      min-width: 160px;
      z-index: 100;
      font-family: inherit;
      transition: transform 0.15s, background 0.2s;
    }

    .fab:hover { background: var(--primary-dark); }
    .fab:focus-visible { outline: 2px solid var(--primary); outline-offset: 3px; }
    .fab:active { transform: translateX(-50%) scale(0.96); }

    @media (min-width: 768px) {
      .fab { left: auto; right: calc(50% - 300px + 16px); transform: none; }
      .fab:active { transform: scale(0.96); }
    }

    /* Modals */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    .modal--open { display: flex; }

    @media (min-width: 768px) {
      .modal { align-items: center; }
    }

    .modal__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
    }

    .modal__content {
      position: relative;
      background: var(--card);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      z-index: 1;
      animation: slideUp 0.3s ease;
    }

    @media (min-width: 768px) {
      .modal__content {
        border-radius: var(--radius);
        max-width: 480px;
        max-height: 85vh;
      }
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal__title {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .modal__close {
      background: var(--bg);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }

    .modal__close:focus-visible {
      outline: 2px solid var(--primary);
    }

    .modal__close:active { transform: scale(0.95); }

    /* Forms */
    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: inherit;
      background: var(--bg);
      min-height: 44px;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: 2px solid var(--primary);
      border-color: var(--primary);
    }

    /* Installments in form */
    .installment-list { margin-bottom: 12px; }

    .installment-item {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      padding: 10px;
      background: var(--bg);
      border-radius: var(--radius-sm);
    }

    .installment-item--paid { opacity: 0.6; }

    .installment-item input[type="date"],
    .installment-item input[type="number"] {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.875rem;
      font-family: inherit;
      min-height: 40px;
      background: var(--card);
    }

    .installment-item__remove {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 1.25rem;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .installment-item__remove:focus-visible {
      outline: 2px solid var(--danger);
      border-radius: 8px;
    }

    .btn-add-installment {
      width: 100%;
      padding: 12px;
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--primary);
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      min-height: 44px;
      font-family: inherit;
    }

    .btn-add-installment:focus-visible {
      outline: 2px solid var(--primary);
    }

    .btn-add-installment:active { transform: scale(0.98); }

    /* Modal actions */
    .modal__actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      font-family: inherit;
      transition: transform 0.15s;
    }

    .btn:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .btn:active { transform: scale(0.98); }

    .btn--primary { background: var(--primary); color: white; }
    .btn--primary:hover { background: var(--primary-dark); }
    .btn--secondary { background: var(--bg); color: var(--text); }
    .btn--danger { background: var(--danger); color: white; }

    .btn--danger-outline {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      margin-top: 12px;
      width: 100%;
    }

    /* Detail modal installments */
    .detail-installment {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
    }

    .detail-installment--paid {
      opacity: 0.55;
    }

    .detail-installment--overdue {
      border-left: 3px solid var(--danger);
    }

    .detail-installment__month {
      flex: 1;
      font-weight: 500;
    }

    .detail-installment__amount {
      font-weight: 600;
      color: var(--danger);
    }

    .detail-installment__paid-label {
      font-size: 0.8125rem;
      color: var(--success);
      font-weight: 600;
    }

    .detail-installment input[type="checkbox"] {
      width: 24px;
      height: 24px;
      accent-color: var(--success);
      cursor: pointer;
    }

    .dashboard__value--warning { color: #ff9500; font-size: 1.125rem; }

    .warning-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: #fff3e0;
      color: #e65100;
      font-size: 0.6875rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .payday-banner {
      background: #fff3e0;
      border: 1px solid #ffcc80;
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: 0.875rem;
      color: #e65100;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .payday-banner__count {
      font-weight: 700;
    }

    .debt-card__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .due-item__tags {
      margin-top: 4px;
    }

    .detail-installment__date-row {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    /* Delete modal */
    .delete-modal__text {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      line-height: 1.6;
    }

    .delete-modal__name {
      font-weight: 700;
      color: var(--text);
    }

    /* Main navigation */
    .main-nav {
      display: flex;
      background: var(--border);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
      margin-bottom: 16px;
    }

    .main-nav__btn {
      flex: 1;
      min-height: 44px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .main-nav__btn:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .main-nav__btn--active {
      background: var(--card);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
      color: var(--primary);
      font-weight: 600;
    }

    .main-nav__btn:active { transform: scale(0.98); }

    .view-section { display: none; }
    .view-section--active { display: block; }

    /* Notes */
    .note-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      cursor: pointer;
      border: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
      color: inherit;
      transition: transform 0.15s;
    }

    .note-card:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .note-card:active { transform: scale(0.98); }

    .note-card__title {
      font-size: 1.0625rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .note-card__preview {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .note-card__date {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .form-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: inherit;
      background: var(--bg);
      min-height: 120px;
      resize: vertical;
    }

    .form-group textarea:focus {
      outline: 2px solid var(--primary);
      border-color: var(--primary);
    }

    .detail-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    .detail-actions .btn--danger-outline {
      margin-top: 0;
    }

    .form-error {
      display: none;
      background: #ffebee;
      color: var(--danger);
      border: 1px solid #ffcdd2;
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .form-error--visible { display: block; }

    .overdue-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: #ffebee;
      color: var(--danger);
      font-size: 0.6875rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .overdue-banner {
      background: #ffebee;
      border: 1px solid #ffcdd2;
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 12px;
      font-size: 0.875rem;
      color: var(--danger);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .overdue-banner__count { font-weight: 700; }

    .dashboard__value--success { color: var(--success); font-size: 1.125rem; }

    /* Settings */
    .settings-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .settings-card__title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .settings-card__desc {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .settings-card__meta {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .settings-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .settings-row .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    .settings-row .btn {
      flex: 0 0 auto;
      min-width: 100px;
    }

    .fixed-preview {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-top: 12px;
      line-height: 1.5;
    }

    .fixed-preview__total {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--danger);
      margin-top: 4px;
    }

    .installment-summary {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-top: 12px;
      line-height: 1.5;
    }

    .installment-summary__row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .installment-summary__status--match {
      color: var(--success);
      font-weight: 600;
    }

    .installment-summary__status--over {
      color: var(--danger);
      font-weight: 600;
    }

    .installment-summary__status--remaining {
      color: var(--primary);
      font-weight: 600;
    }

    .installment-item input[readonly] {
      pointer-events: none;
      opacity: 0.85;
      background: var(--bg);
    }

    .form-group input[readonly] {
      background: var(--bg);
      color: var(--text-secondary);
    }

    /* Settled history — pink theme */
    :root {
      --history-pink: #ff2d55;
      --history-pink-dark: #d42347;
      --history-pink-bg: #fff0f5;
      --history-pink-border: #ffc2d4;
    }

    .history-header {
      margin-bottom: 16px;
    }

    .history-header__title {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--history-pink);
      margin-bottom: 4px;
    }

    .history-header__desc {
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .history-card {
      background: var(--history-pink-bg);
      border: 1px solid var(--history-pink-border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: 0 2px 12px rgba(255, 45, 85, 0.1);
      cursor: pointer;
      border-left: 4px solid var(--history-pink);
      width: 100%;
      text-align: left;
      font-family: inherit;
      color: inherit;
      transition: transform 0.15s;
    }

    .history-card:focus-visible {
      outline: 2px solid var(--history-pink);
      outline-offset: 2px;
    }

    .history-card:active { transform: scale(0.98); }

    .history-card__badge {
      display: inline-block;
      background: var(--history-pink);
      color: white;
      font-size: 0.6875rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .history-card__header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .history-card__name {
      font-size: 1.0625rem;
      font-weight: 600;
    }

    .history-card__type {
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .history-card__amount {
      font-size: 1.125rem;

<body>
  <div id="app-loader" aria-live="polite" aria-label="Loading Debt Tracker">
    <div class="app-loader__orb app-loader__orb--1" aria-hidden="true"></div>

        </defs>

  <script>
    // ========== DATA MODELS ==========
    const DEBT_TYPES = [
      { value: "credit-card", label: "💳 Credit Card" },
      { value: "loan", label: "💰 Loan" },
      { value: "friend", label: "👥 Friend/Family" },
      { value: "bill", label: "📄 Bill" },
      { value: "BNPL", label: "💳 BNPL" },
      { value: "other", label: "📦 Other" }
    ];

    const TYPE_ORDER = ["credit-card", "loan", "friend", "bill", "BNPL", "other"];
    const APP_VERSION = "1.6.0";
    const STORAGE_VERSION_KEY = "debt_tracker_version";
    const DEFAULT_PAYDAY = 22;
    const FIXED_TERM_MONTHS = [6, 9, 12, 18, 24, 30, 36, 42, 48, 58, 60];

    function generateId() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    const DEFAULT_INSTALLMENT = {
      date: "",
      amount: 0,
      paid: false
    };

    function createDefaultDebt() {
      return {
        id: generateId(),
        name: "",
        type: "other",
        totalAmount: 0,
        installments: [],
        settledAt: null,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
    }

    function createDefaultNote() {
      return {
        id: generateId(),
        title: "",
        content: "",
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
    }

    let debts = [];
    let notes = [];
    let payday = DEFAULT_PAYDAY;
    let currentView = "debts";
    let groupingMode = "type";
    let editingDebtId = null;
    let editingNoteId = null;
    let detailDebtId = null;
    let deleteTarget = null;
    let formInstallments = [];
    let installmentMode = "custom";

    // ========== STORAGE FUNCTIONS ==========
    function saveAppData() {
      try {
        localStorage.setItem('debt_tracker_data', JSON.stringify({
          debts: debts,
          notes: notes,
          payday: payday,
          groupingMode: groupingMode,
          currentView: currentView,
          lastUpdated: new Date().toISOString()
        }));
        localStorage.setItem(STORAGE_VERSION_KEY, APP_VERSION);
      } catch (e) {
        console.error("Storage failed:", e);
        alert("Storage failed — app may not work properly");
      }
    }

    function saveDebts() {
      saveAppData();
    }

    function saveNotes() {
      saveAppData();
    }

    function loadDebts() {
      const saved = localStorage.getItem('debt_tracker_data');
      if (saved) {
        const data = JSON.parse(saved);
        debts = data.debts || [];
        notes = data.notes || [];
        payday = data.payday || DEFAULT_PAYDAY;
        groupingMode = data.groupingMode || "type";
        currentView = data.currentView || "debts";
      } else {
        debts = [];
        notes = [];
        payday = DEFAULT_PAYDAY;
        groupingMode = "type";
        currentView = "debts";
      }

      const beforeCount = debts.length;
      debts = debts.filter(function(d) { return !String(d.id).startsWith("sample-"); });
      localStorage.removeItem('debt_tracker_sample_loaded');

      const storedVersion = localStorage.getItem(STORAGE_VERSION_KEY) || "0";
      let needsSave = debts.length !== beforeCount;

      if (runMigrations(storedVersion)) {
        needsSave = true;
      }

      if (needsSave) {
        saveDebts();
      }
    }

    function compareVersions(a, b) {
      const pa = a.split(".").map(Number);
      const pb = b.split(".").map(Number);
      for (let i = 0; i < 3; i++) {
        const av = pa[i] || 0;
        const bv = pb[i] || 0;
        if (av < bv) return -1;
        if (av > bv) return 1;
      }
      return 0;
    }

    function runMigrations(fromVersion) {
      let changed = false;

      if (compareVersions(fromVersion, "1.1.0") < 0) {
        if (migrateInstallmentDates()) changed = true;
      }

      if (compareVersions(fromVersion, "1.3.0") < 0) {
        if (!payday || payday < 1 || payday > 31) {
          payday = DEFAULT_PAYDAY;
          changed = true;
        }
      }

      if (compareVersions(fromVersion, "1.5.0") < 0) {
        if (migrateSettledDebts()) changed = true;
      }

      localStorage.setItem(STORAGE_VERSION_KEY, APP_VERSION);
      return changed;
    }

    function isDebtSettled(debt) {
      return !!debt.settledAt;
    }

    function getActiveDebts() {
      return debts.filter(function(d) { return !isDebtSettled(d); });
    }

    function getSettledDebts() {
      return debts.filter(function(d) { return isDebtSettled(d); })
        .sort(function(a, b) { return new Date(b.settledAt) - new Date(a.settledAt); });
    }

    function updateDebtSettlementStatus(debt) {
      if (debt.installments.length > 0 && calculateRemainingBalance(debt) === 0) {
        if (!debt.settledAt) {
          debt.settledAt = new Date().toISOString();
        }
      } else {
        debt.settledAt = null;
      }
    }

    function migrateSettledDebts() {
      let changed = false;
      debts.forEach(function(debt) {
        if (debt.settledAt === undefined) {
          debt.settledAt = null;
          changed = true;
        }
        const before = debt.settledAt;
        updateDebtSettlementStatus(debt);
        if (before !== debt.settledAt) changed = true;
      });
      return changed;
    }

    function calculateTotalPaid(debt) {
      return debt.installments.reduce(function(sum, inst) {
        return sum + inst.amount;
      }, 0);
    }

    function migrateInstallmentDates() {
      let changed = false;
      debts.forEach(function(debt) {
        debt.installments.forEach(function(inst) {
          if (!inst.date && inst.month) {
            inst.date = inst.month.length === 7 ? inst.month + "-01" : inst.month;
            delete inst.month;
            changed = true;
          }
        });
      });
      return changed;
    }

    function getInstallmentDate(inst) {
      return inst.date || inst.month || "";
    }

    function parseInstallmentDate(dateStr) {
      if (!dateStr) return null;
      const parts = dateStr.split("-");
      if (parts.length === 3) {
        return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
      }
      if (parts.length === 2) {
        return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, 1);
      }
      return null;
    }

    function formatInstallmentDate(dateStr) {
      const d = parseInstallmentDate(dateStr);
      if (!d) return dateStr || "";
      const day = String(d.getDate()).padStart(2, "0");
      const month = String(d.getMonth() + 1).padStart(2, "0");
      return day + "-" + month + "-" + d.getFullYear();
    }

    function formatInstallmentDateShort(dateStr) {
      const d = parseInstallmentDate(dateStr);
      if (!d) return dateStr || "";
      return d.toLocaleDateString("en-MY", { day: "numeric", month: "short", year: "numeric" });
    }

    function getOrdinal(n) {
      const s = ["th", "st", "nd", "rd"];
      const v = n % 100;
      return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function isDueBeforePayday(dateStr) {
      const d = parseInstallmentDate(dateStr);
      if (!d) return false;
      return d.getDate() < payday;
    }

    function isInCurrentMonth(dateStr) {
      const d = parseInstallmentDate(dateStr);
      if (!d) return false;
      const now = new Date();
      return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    }

    function isCurrentMonthBeforePayday(dateStr) {
      return isInCurrentMonth(dateStr) && isDueBeforePayday(dateStr);
    }

    function isOverdue(dateStr) {
      const d = parseInstallmentDate(dateStr);
      if (!d) return false;
      return startOfDay(d) < startOfDay(new Date());
    }

    function renderWarningTag() {
      return '<span class="warning-tag">⚠ Before ' + getOrdinal(payday) + '</span>';
    }

    function renderOverdueTag() {
      return '<span class="overdue-tag">● Overdue</span>';
    }

    function renderInstallmentTags(dueDate, paid) {
      if (paid || !dueDate) return "";
      let tags = "";
      if (isOverdue(dueDate)) tags += renderOverdueTag();
      if (isCurrentMonthBeforePayday(dueDate)) tags += renderWarningTag();
      return tags ? '<span style="display:inline-flex;flex-wrap:wrap;gap:4px">' + tags + '</span>' : "";
    }

    function debtHasBeforePaydayWarning(debt) {
      return debt.installments.some(function(inst) {
        return !inst.paid && isCurrentMonthBeforePayday(getInstallmentDate(inst));
      });
    }

    function debtHasOverdue(debt) {
      return debt.installments.some(function(inst) {
        return !inst.paid && isOverdue(getInstallmentDate(inst));
      });
    }

    function countUnpaidBeforePayday() {
      let count = 0;
      getActiveDebts().forEach(function(debt) {
        debt.installments.forEach(function(inst) {
          if (!inst.paid && isCurrentMonthBeforePayday(getInstallmentDate(inst))) {
            count++;
          }
        });
      });
      return count;
    }

    function countOverdue() {
      let count = 0;
      getActiveDebts().forEach(function(debt) {
        debt.installments.forEach(function(inst) {
          if (!inst.paid && isOverdue(getInstallmentDate(inst))) {
            count++;
          }
        });
      });
      return count;
    }

    // ========== CALCULATION FUNCTIONS ==========
    function calculateRemainingBalance(debt) {
      return debt.installments
        .filter(function(inst) { return !inst.paid; })
        .reduce(function(sum, inst) { return sum + inst.amount; }, 0);
    }

    function getDebtTotalAmount(debt) {
      if (debt.totalAmount > 0) return debt.totalAmount;
      return calculateInstallmentsTotal(debt.installments);
    }

    function compareDebtsByTotalAmount(a, b) {
      return getDebtTotalAmount(a) - getDebtTotalAmount(b);
    }

    function calculateTotalRemaining() {
      return getActiveDebts().reduce(function(sum, debt) {
        return sum + calculateRemainingBalance(debt);
      }, 0);
    }

    function calculateCurrentMonthDue() {
      const now = new Date();
      return getActiveDebts().reduce(function(sum, debt) {
        return sum + debt.installments.reduce(function(s, inst) {
          if (inst.paid) return s;
          const d = parseInstallmentDate(getInstallmentDate(inst));
          if (!d) return s;
          if (d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth()) {
            return s + inst.amount;
          }
          return s;
        }, 0);
      }, 0);
    }

    function calculateLastPaymentDate(debt) {
      const unpaid = debt.installments
        .filter(function(inst) { return !inst.paid; })
        .map(function(inst) { return getInstallmentDate(inst); })
        .filter(function(d) { return d; })
        .sort();

      if (unpaid.length === 0) return null;
      return unpaid[unpaid.length - 1];
    }

    function getNextPaymentDate() {
      const dates = [];
      getActiveDebts().forEach(function(debt) {
        debt.installments.forEach(function(inst) {
          if (!inst.paid && getInstallmentDate(inst)) {
            dates.push(getInstallmentDate(inst));
          }
        });
      });
      dates.sort();
      return dates.length > 0 ? dates[0] : null;
    }

    function getNextPaymentAmount() {
      const nextDate = getNextPaymentDate();
      if (!nextDate) return 0;

      let amount = 0;
      getActiveDebts().forEach(function(debt) {
        debt.installments.forEach(function(inst) {
          if (!inst.paid && getInstallmentDate(inst) === nextDate) {
            amount += inst.amount;
          }
        });
      });
      return roundMoney(amount);
    }

    function getNextPaymentForDebt(debt) {
      const dates = debt.installments
        .filter(function(inst) { return !inst.paid; })
        .map(function(inst) { return getInstallmentDate(inst); })
        .filter(function(d) { return d; })
        .sort();
      return dates.length > 0 ? dates[0] : null;
    }

    function getNextPaymentAmountForDebt(debt) {
      const nextDate = getNextPaymentForDebt(debt);
      if (!nextDate) return 0;

      return roundMoney(debt.installments.reduce(function(sum, inst) {
        if (!inst.paid && getInstallmentDate(inst) === nextDate) {
          return sum + inst.amount;
        }
        return sum;
      }, 0));
    }

    function getActiveDebtsCount() {
      return getActiveDebts().filter(function(debt) {
        return calculateRemainingBalance(debt) > 0;
      }).length;
    }

    function getDebtFreeDate() {
      const lastDates = getActiveDebts()
        .map(calculateLastPaymentDate)
        .filter(function(d) { return d !== null; })
        .sort();

      if (lastDates.length === 0) return null;
      return lastDates[lastDates.length - 1];
    }

    function hasDuplicateInstallmentDates(installments) {
      const seen = {};
      for (let i = 0; i < installments.length; i++) {
        const date = getInstallmentDate(installments[i]);
        if (!date) continue;
        if (seen[date]) return true;
        seen[date] = true;
      }
      return false;
    }

    function showFormError(elementId, message) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.classList.add("form-error--visible");
    }

    function clearFormError(elementId) {
      const el = document.getElementById(elementId);
      el.textContent = "";
      el.classList.remove("form-error--visible");
    }

    function formatDateForInput(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + d;
    }

    function dateWithDay(year, month, day) {
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      return new Date(year, month, Math.min(day, daysInMonth));
    }

    function getDefaultFirstPaymentDate() {
      const now = new Date();
      let d = dateWithDay(now.getFullYear(), now.getMonth(), payday);
      if (startOfDay(d) < startOfDay(now)) {
        d = dateWithDay(now.getFullYear(), now.getMonth() + 1, payday);
      }
      return formatDateForInput(d);
    }

    function generateFixedInstallments(months, monthlyAmount, startDateStr) {
      const count = months;
      const start = parseInstallmentDate(startDateStr);
      if (!start || monthlyAmount <= 0 || !months) return [];

      const installments = [];
      const paymentDay = start.getDate();

      for (let i = 0; i < count; i++) {
        const d = dateWithDay(start.getFullYear(), start.getMonth() + i, paymentDay);
        installments.push({
          date: formatDateForInput(d),
          amount: monthlyAmount,
          paid: false
        });
      }
      return installments;
    }

    function getCustomStartDate(installments) {
      for (let i = 0; i < installments.length; i++) {
        const d = parseInstallmentDate(getInstallmentDate(installments[i]));
        if (d) return d;
      }
      return null;
    }

    function regenerateCustomDatesFromFirst(installments) {
      if (installments.length === 0) return;

      const firstDate = parseInstallmentDate(getInstallmentDate(installments[0]));
      if (!firstDate) {
        for (let i = 1; i < installments.length; i++) {
          installments[i].date = "";
        }
        return;
      }

      const paymentDay = firstDate.getDate();
      for (let i = 1; i < installments.length; i++) {
        const d = dateWithDay(firstDate.getFullYear(), firstDate.getMonth() + i, paymentDay);
        installments[i].date = formatDateForInput(d);
      }
    }

    function getNextCustomDate(installments) {
      const start = getCustomStartDate(installments);
      if (!start) return "";

      const paymentDay = start.getDate();
      const d = dateWithDay(start.getFullYear(), start.getMonth() + installments.length, paymentDay);
      return formatDateForInput(d);
    }

    function setInstallmentMode(mode) {
      installmentMode = mode;
      const isFixed = mode === "fixed";

      document.getElementById("mode-custom-btn").classList.toggle("segmented-control__btn--active", !isFixed);
      document.getElementById("mode-fixed-btn").classList.toggle("segmented-control__btn--active", isFixed);
      document.getElementById("mode-custom-btn").setAttribute("aria-selected", !isFixed ? "true" : "false");
      document.getElementById("mode-fixed-btn").setAttribute("aria-selected", isFixed ? "true" : "false");

      document.getElementById("fixed-installment-fields").style.display = isFixed ? "block" : "none";
      document.getElementById("custom-installment-fields").style.display = isFixed ? "none" : "block";
      document.getElementById("fixed-installment-preview-group").style.display = isFixed ? "block" : "none";

      const totalInput = document.getElementById("debt-total");
      totalInput.readOnly = isFixed;
      if (!isFixed) {
        totalInput.placeholder = "0.00";
      }

      if (isFixed) {
        if (!document.getElementById("fixed-start").value) {
          document.getElementById("fixed-start").value = getDefaultFirstPaymentDate();
        }
        document.getElementById("form-installments").innerHTML = "";
        updateFixedPlan();
      } else {
        updateCustomInstallmentSummary();
      }
    }

    function updateFixedPlan() {
      if (installmentMode !== "fixed") return;

      const months = parseInt(document.getElementById("fixed-months").value, 10);
      const monthly = parseFloat(document.getElementById("fixed-monthly").value) || 0;
      const start = document.getElementById("fixed-start").value;
      const count = months;
      const total = monthly * count;
      const previewEl = document.getElementById("fixed-preview");

      document.getElementById("debt-total").value = total > 0 ? total : "";

      if (monthly > 0 && start && months) {
        formInstallments = generateFixedInstallments(months, monthly, start);
        previewEl.innerHTML =
          count + " monthly payments × " + formatCurrency(monthly) +
          '<div class="fixed-preview__total">Total: ' + formatCurrency(total) + '</div>';
        renderFixedInstallmentsPreview();
      } else {
        formInstallments = [];
        previewEl.textContent = "Enter duration and monthly amount to preview.";
        document.getElementById("fixed-installments-preview").innerHTML = "";
      }
    }

    function renderFixedInstallmentsPreview() {
      const container = document.getElementById("fixed-installments-preview");
      const showCount = Math.min(formInstallments.length, 3);

      if (formInstallments.length === 0) {
        container.innerHTML = "";
        return;
      }

      let html = formInstallments.slice(0, showCount).map(function(inst, index) {
        return (
          '<div class="installment-item installment-item--readonly">' +
            '<input type="date" value="' + inst.date + '" readonly tabindex="-1" aria-label="Payment ' + (index + 1) + ' date">' +
            '<input type="number" value="' + inst.amount + '" readonly tabindex="-1" aria-label="Payment ' + (index + 1) + ' amount">' +
          '</div>'
        );
      }).join("");

      if (formInstallments.length > showCount) {
        html += '<p style="font-size:0.8125rem;color:var(--text-secondary);padding:8px 4px">… and ' +
          (formInstallments.length - showCount) + ' more payments</p>';
      }

      container.innerHTML = html;
    }

    function formatCurrency(amount) {
      return "RM" + amount.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }

    function roundMoney(amount) {
      return Math.round(amount * 100) / 100;
    }

    function moneyEquals(a, b) {
      return roundMoney(a) === roundMoney(b);
    }

    function calculateInstallmentsTotal(installments) {
      return roundMoney(installments.reduce(function(sum, inst) {
        return sum + (parseFloat(inst.amount) || 0);
      }, 0));
    }

    function getCustomInstallmentsTotalFromForm() {
      let total = 0;
      document.querySelectorAll("#form-installments input[data-field='amount']").forEach(function(input) {
        total += parseFloat(input.value) || 0;
      });
      return roundMoney(total);
    }

    function getFormInstallmentsFromDom() {
      const rows = document.querySelectorAll("#form-installments .installment-item");
      return Array.from(rows).map(function(row, index) {
        const inst = formInstallments[index] || { paid: false };
        const dateInput = row.querySelector('input[data-field="date"]');
        const amountInput = row.querySelector('input[data-field="amount"]');
        return {
          date: dateInput ? dateInput.value : (inst.date || inst.month || ""),
          amount: amountInput ? (parseFloat(amountInput.value) || 0) : (parseFloat(inst.amount) || 0),
          paid: !!inst.paid
        };
      });
    }

    function getDebtFormInstallments() {
      if (installmentMode === "fixed" && !editingDebtId) {
        return formInstallments.map(function(inst) {
          return {
            date: inst.date || inst.month || "",
            amount: parseFloat(inst.amount) || 0,
            paid: !!inst.paid
          };
        });
      }
      return getFormInstallmentsFromDom();
    }

    function syncDebtTotalForEdit(installments, storedTotal) {
      const installmentsTotal = calculateInstallmentsTotal(installments);
      if (storedTotal > 0 && moneyEquals(storedTotal, installmentsTotal)) {
        return storedTotal;
      }
      return installmentsTotal > 0 ? installmentsTotal : (storedTotal || 0);
    }

    function updateCustomInstallmentSummary() {
      const summaryEl = document.getElementById("custom-installment-summary");
      if (!summaryEl) return;

      if (installmentMode !== "custom") {
        summaryEl.style.display = "none";
        summaryEl.innerHTML = "";
        return;
      }

      summaryEl.style.display = "block";
      const totalAmount = parseFloat(document.getElementById("debt-total").value) || 0;
      const installmentsTotal = getCustomInstallmentsTotalFromForm();
      const difference = roundMoney(totalAmount - installmentsTotal);

      if (totalAmount <= 0) {
        summaryEl.innerHTML =
          '<div class="installment-summary__row">' +
            '<span>Installments total</span>' +
            '<span>' + formatCurrency(installmentsTotal) + '</span>' +
          '</div>' +
          '<div style="margin-top:4px">Enter a total amount to check your payment plan.</div>';
        return;
      }

      let statusHtml;
      if (moneyEquals(installmentsTotal, totalAmount)) {
        statusHtml = '<span class="installment-summary__status--match">Totals match</span>';
      } else if (difference < 0) {
        statusHtml = '<span class="installment-summary__status--over">' + formatCurrency(Math.abs(difference)) + ' over</span>';
      } else {
        statusHtml = '<span class="installment-summary__status--remaining">' + formatCurrency(difference) + ' remaining</span>';
      }

      summaryEl.innerHTML =
        '<div class="installment-summary__row">' +
          '<span>Installments total</span>' +
          '<span>' + formatCurrency(installmentsTotal) + ' / ' + formatCurrency(totalAmount) + '</span>' +
        '</div>' +
        '<div class="installment-summary__row" style="margin-top:4px">' +
          '<span>Status</span>' +
          statusHtml +
        '</div>';
    }

    function getDebtTypeLabel(type) {
      const found = DEBT_TYPES.find(function(t) { return t.value === type; });
      return found ? found.label : type;
    }

    function groupByType(debtList) {
      const groups = {};
      TYPE_ORDER.forEach(function(type) {
        groups[type] = [];
      });

      debtList.forEach(function(debt) {
        if (groups[debt.type]) {
          groups[debt.type].push(debt);
        } else {
          groups.other = groups.other || [];
          groups.other.push(debt);
        }
      });

      return TYPE_ORDER
        .filter(function(type) { return groups[type] && groups[type].length > 0; })
        .map(function(type) {
          return {
            key: type,
            label: getDebtTypeLabel(type),
            debts: groups[type].slice().sort(compareDebtsByTotalAmount)
          };
        });
    }

    function groupByDueDate(debtList) {
      const dateMap = {};

      debtList.forEach(function(debt) {
        debt.installments.forEach(function(inst, index) {
          const dueDate = getInstallmentDate(inst);
          if (!inst.paid && dueDate) {
            if (!dateMap[dueDate]) {
              dateMap[dueDate] = [];
            }
            dateMap[dueDate].push({
              debt: debt,
              installment: inst,
              installmentIndex: index
            });
          }
        });
      });

      return Object.keys(dateMap)
        .sort()
        .map(function(dueDate) {
          return {
            key: dueDate,
            label: formatInstallmentDateShort(dueDate),
            beforePayday: isCurrentMonthBeforePayday(dueDate),
            overdue: isOverdue(dueDate),
            items: dateMap[dueDate].slice().sort(function(a, b) {
              return compareDebtsByTotalAmount(a.debt, b.debt);
            })
          };
        });
    }

    // ========== VALIDATION ==========
    function validateDebt(debt, errorElementId, options) {
      options = options || {};
      clearFormError(errorElementId);

      if (!debt.name || debt.name.trim() === "") {
        showFormError(errorElementId, "Please enter a debt name.");
        return false;
      }
      if (debt.installments.length === 0) {
        showFormError(errorElementId, "Please add at least one installment.");
        return false;
      }
      for (const inst of debt.installments) {
        if (!getInstallmentDate(inst)) {
          showFormError(errorElementId, "Please select a due date for each installment.");
          return false;
        }
        if (inst.amount <= 0) {
          showFormError(errorElementId, "Please enter a valid amount (> 0) for each installment.");
          return false;
        }
      }
      if (hasDuplicateInstallmentDates(debt.installments)) {
        showFormError(errorElementId, "Each installment must have a unique due date.");
        return false;
      }
      if (options.requireTotalMatch) {
        if (!debt.totalAmount || debt.totalAmount <= 0) {
          showFormError(errorElementId, "Please enter a total amount.");
          return false;
        }
        const installmentsTotal = calculateInstallmentsTotal(debt.installments);
        if (!moneyEquals(installmentsTotal, debt.totalAmount)) {
          showFormError(
            errorElementId,
            "Installment total (" + formatCurrency(installmentsTotal) + ") must match total amount (" + formatCurrency(debt.totalAmount) + ")."
          );
          return false;
        }
      }
      return true;
    }

    // ========== CRUD OPERATIONS ==========
    function markInstallmentPaid(debtId, installmentIndex) {
      const debt = debts.find(function(d) { return d.id === debtId; });
      if (!debt || !debt.installments[installmentIndex]) return;
      if (isDebtSettled(debt)) return;

      const wasSettled = isDebtSettled(debt);
      debt.installments[installmentIndex].paid = !debt.installments[installmentIndex].paid;
      debt.updatedAt = new Date().toISOString();
      updateDebtSettlementStatus(debt);
      saveDebts();

      const nowSettled = isDebtSettled(debt);
      const detailModal = document.getElementById("detail-modal");

      if (!wasSettled && nowSettled) {
        closeModal("detail-modal");
        detailDebtId = null;
        currentView = "history";
        saveAppData();
        render();
        return;
      }

      render();

      if (detailDebtId === debtId && detailModal.classList.contains("modal--open")) {
        openDetailModal(debtId);
      }
    }

    function deleteDebt(debtId) {
      const debt = debts.find(function(d) { return d.id === debtId; });
      if (debt && isDebtSettled(debt)) return;

      debts = debts.filter(function(d) { return d.id !== debtId; });
      saveDebts();
      render();
    }

    function deleteNote(noteId) {
      notes = notes.filter(function(n) { return n.id !== noteId; });
      saveNotes();
      render();
    }

    function validateNote(note, errorElementId) {
      clearFormError(errorElementId);

      if (!note.title || note.title.trim() === "") {
        showFormError(errorElementId, "Please enter a note title.");
        return false;
      }
      if (!note.content || note.content.trim() === "") {
        showFormError(errorElementId, "Please enter note content.");
        return false;
      }
      return true;
    }

    function formatDateDisplay(isoStr) {
      if (!isoStr) return "";
      const date = new Date(isoStr);
      return date.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }
